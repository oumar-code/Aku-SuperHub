components:
  schemas:
    AnalyticsBatch:
      description: Batch of analytics events sent from one or more Edge Hubs.
      properties:
        events:
          items:
            $ref: '#/components/schemas/AnalyticsEvent'
          maxItems: 1000
          minItems: 1
          title: Events
          type: array
      required:
      - events
      title: AnalyticsBatch
      type: object
    AnalyticsEvent:
      description: A single analytics event emitted by an Edge Hub.
      properties:
        content_id:
          anyOf:
          - format: uuid
            type: string
          - type: 'null'
          description: Content item involved, if applicable
          title: Content Id
        duration_seconds:
          anyOf:
          - minimum: 0.0
            type: number
          - type: 'null'
          description: Duration, if applicable
          title: Duration Seconds
        event_id:
          description: Unique event identifier (set by Edge Hub)
          format: uuid
          title: Event Id
          type: string
        event_type:
          $ref: '#/components/schemas/EventType'
        hub_id:
          description: Originating Edge Hub identifier
          format: uuid
          title: Hub Id
          type: string
        learner_id:
          description: Anonymised learner identifier
          format: uuid
          title: Learner Id
          type: string
        metadata:
          additionalProperties:
            anyOf:
            - type: string
            - type: integer
            - type: number
            - type: boolean
          description: Additional event-specific key/value pairs
          title: Metadata
          type: object
        occurred_at:
          description: Event timestamp in UTC (set by Edge Hub)
          format: date-time
          title: Occurred At
          type: string
        session_id:
          anyOf:
          - format: uuid
            type: string
          - type: 'null'
          description: Session this event belongs to
          title: Session Id
      required:
      - event_id
      - hub_id
      - learner_id
      - event_type
      - occurred_at
      title: AnalyticsEvent
      type: object
    BatchIngestResult:
      properties:
        duplicates:
          description: Duplicate event_ids skipped
          minimum: 0.0
          title: Duplicates
          type: integer
        errors:
          description: Events that failed validation or write
          minimum: 0.0
          title: Errors
          type: integer
        ingested_at:
          format: date-time
          title: Ingested At
          type: string
        inserted:
          description: New events inserted
          minimum: 0.0
          title: Inserted
          type: integer
        received:
          description: Total events in the batch
          minimum: 0.0
          title: Received
          type: integer
      required:
      - received
      - inserted
      - duplicates
      - errors
      title: BatchIngestResult
      type: object
    EdgeHub:
      properties:
        firmware_version:
          description: Semantic version string of hub firmware
          title: Firmware Version
          type: string
        hub_id:
          description: Unique hub identifier
          format: uuid
          title: Hub Id
          type: string
        ip_address:
          description: Hub IP address or hostname
          title: Ip Address
          type: string
        last_seen_at:
          anyOf:
          - format: date-time
            type: string
          - type: 'null'
          description: Last heartbeat timestamp (UTC)
          title: Last Seen At
        name:
          description: Human-readable hub name
          maxLength: 128
          minLength: 1
          title: Name
          type: string
        region:
          description: Region code (e.g. 'us-east-1')
          maxLength: 64
          minLength: 1
          title: Region
          type: string
        registered_at:
          description: Hub registration timestamp (UTC)
          format: date-time
          title: Registered At
          type: string
        status:
          $ref: '#/components/schemas/HubStatus'
        tags:
          additionalProperties:
            type: string
          description: Arbitrary key/value labels
          title: Tags
          type: object
      required:
      - hub_id
      - region
      - name
      - status
      - ip_address
      - firmware_version
      - registered_at
      title: EdgeHub
      type: object
    EdgeHubHealth:
      properties:
        alerts:
          description: Active alert messages, if any
          items:
            type: string
          title: Alerts
          type: array
        checked_at:
          format: date-time
          title: Checked At
          type: string
        hub_id:
          format: uuid
          title: Hub Id
          type: string
        metrics:
          $ref: '#/components/schemas/HubHealthMetrics'
        status:
          $ref: '#/components/schemas/HubStatus'
      required:
      - hub_id
      - status
      - metrics
      title: EdgeHubHealth
      type: object
    EventType:
      enum:
      - SESSION_START
      - SESSION_END
      - CONTENT_VIEW
      - ASSESSMENT_SUBMIT
      - MODEL_INFERENCE
      title: EventType
      type: string
    FineTuneJobResponse:
      properties:
        base_model_id:
          title: Base Model Id
          type: string
        job_id:
          description: Unique identifier for the fine-tuning job
          format: uuid
          title: Job Id
          type: string
        message:
          description: Human-readable status message
          title: Message
          type: string
        queued_at:
          format: date-time
          title: Queued At
          type: string
        status:
          $ref: '#/components/schemas/FineTuneStatus'
      required:
      - job_id
      - status
      - base_model_id
      - message
      title: FineTuneJobResponse
      type: object
    FineTuneRequest:
      properties:
        base_model_id:
          description: Identifier of the base model to fine-tune
          maxLength: 256
          minLength: 1
          title: Base Model Id
          type: string
        dataset_window_hours:
          default: 168
          description: Hours of recent analytics data to use as the training dataset
          maximum: 8760.0
          minimum: 1.0
          title: Dataset Window Hours
          type: integer
        learning_rate:
          default: 2.0e-05
          description: Learning rate for the fine-tune run
          exclusiveMinimum: 0.0
          title: Learning Rate
          type: number
        max_steps:
          default: 500
          description: Maximum training steps
          maximum: 10000.0
          minimum: 1.0
          title: Max Steps
          type: integer
        notes:
          anyOf:
          - maxLength: 1024
            type: string
          - type: 'null'
          description: Optional free-text notes for this job
          title: Notes
      required:
      - base_model_id
      title: FineTuneRequest
      type: object
    FineTuneStatus:
      enum:
      - QUEUED
      - RUNNING
      - COMPLETED
      - FAILED
      title: FineTuneStatus
      type: string
    HTTPValidationError:
      properties:
        detail:
          items:
            $ref: '#/components/schemas/ValidationError'
          title: Detail
          type: array
      title: HTTPValidationError
      type: object
    HubHealthMetrics:
      properties:
        active_learners:
          description: Learners currently active on hub
          minimum: 0.0
          title: Active Learners
          type: integer
        cpu_percent:
          description: CPU utilisation %
          maximum: 100.0
          minimum: 0.0
          title: Cpu Percent
          type: number
        disk_percent:
          description: Disk utilisation %
          maximum: 100.0
          minimum: 0.0
          title: Disk Percent
          type: number
        memory_percent:
          description: Memory utilisation %
          maximum: 100.0
          minimum: 0.0
          title: Memory Percent
          type: number
        uptime_seconds:
          description: Hub process uptime in seconds
          minimum: 0.0
          title: Uptime Seconds
          type: integer
      required:
      - cpu_percent
      - memory_percent
      - disk_percent
      - active_learners
      - uptime_seconds
      title: HubHealthMetrics
      type: object
    HubStatus:
      enum:
      - ONLINE
      - OFFLINE
      - DEGRADED
      - MAINTENANCE
      title: HubStatus
      type: string
    PaginatedHubs:
      properties:
        items:
          items:
            $ref: '#/components/schemas/EdgeHub'
          title: Items
          type: array
        page:
          minimum: 1.0
          title: Page
          type: integer
        page_size:
          minimum: 1.0
          title: Page Size
          type: integer
        pages:
          minimum: 0.0
          title: Pages
          type: integer
        total:
          minimum: 0.0
          title: Total
          type: integer
      required:
      - items
      - total
      - page
      - page_size
      - pages
      title: PaginatedHubs
      type: object
    RegionalSummary:
      description: Aggregated analytics summary for the SuperHub's region.
      properties:
        active_hubs:
          description: Hubs that reported events in the window
          minimum: 0.0
          title: Active Hubs
          type: integer
        average_session_duration_seconds:
          anyOf:
          - minimum: 0.0
            type: number
          - type: 'null'
          description: Mean session duration; null if no sessions
          title: Average Session Duration Seconds
        generated_at:
          format: date-time
          title: Generated At
          type: string
        region:
          title: Region
          type: string
        total_assessments:
          description: Total ASSESSMENT_SUBMIT events
          minimum: 0.0
          title: Total Assessments
          type: integer
        total_content_views:
          description: Total CONTENT_VIEW events
          minimum: 0.0
          title: Total Content Views
          type: integer
        total_learners:
          description: Distinct learners with at least one event
          minimum: 0.0
          title: Total Learners
          type: integer
        total_sessions:
          description: Total completed sessions
          minimum: 0.0
          title: Total Sessions
          type: integer
        window_end:
          description: End of the aggregation window (UTC)
          format: date-time
          title: Window End
          type: string
        window_start:
          description: Start of the aggregation window (UTC)
          format: date-time
          title: Window Start
          type: string
      required:
      - region
      - total_learners
      - total_sessions
      - total_content_views
      - total_assessments
      - active_hubs
      - window_start
      - window_end
      title: RegionalSummary
      type: object
    ValidationError:
      properties:
        ctx:
          title: Context
          type: object
        input:
          title: Input
        loc:
          items:
            anyOf:
            - type: string
            - type: integer
          title: Location
          type: array
        msg:
          title: Message
          type: string
        type:
          title: Error Type
          type: string
      required:
      - loc
      - msg
      - type
      title: ValidationError
      type: object
info:
  description: Regional analytics and fleet management service for the Aku Platform.
    Aggregates telemetry from Edge Hubs, provides regional analytics summaries, and
    triggers model fine-tuning jobs.
  title: Aku-SuperHub
  version: 0.1.0
openapi: 3.1.0
paths:
  /api/v1/analytics/aggregate:
    post:
      description: Accept a batch of analytics events forwarded by Edge Hub devices.
        Events are upserted; duplicates (matched on event_id) are silently skipped.
        Batch size is capped at 1 000 events per request.
      operationId: aggregate_analytics_api_v1_analytics_aggregate_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AnalyticsBatch'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BatchIngestResult'
          description: Successful Response
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      summary: Ingest analytics events from Edge Hubs
      tags:
      - Analytics
  /api/v1/analytics/summary:
    get:
      description: Return aggregated analytics for the SuperHub's region over the
        requested time window (defaults to the last 24 hours). Metrics include total
        learners, sessions, content views, assessments, and average session duration.
      operationId: get_analytics_summary_api_v1_analytics_summary_get
      parameters:
      - description: Aggregation window size in hours (max 720 = 30 days)
        in: query
        name: window_hours
        required: false
        schema:
          default: 24
          description: Aggregation window size in hours (max 720 = 30 days)
          maximum: 720
          minimum: 1
          title: Window Hours
          type: integer
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RegionalSummary'
          description: Successful Response
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      summary: Regional analytics summary
      tags:
      - Analytics
  /api/v1/fleet:
    get:
      description: Return a paginated list of all Edge Hub devices registered to this
        SuperHub's region, sorted by registration date descending.
      operationId: list_hubs_api_v1_fleet_get
      parameters:
      - description: Page number (1-based)
        in: query
        name: page
        required: false
        schema:
          default: 1
          description: Page number (1-based)
          minimum: 1
          title: Page
          type: integer
      - description: Items per page
        in: query
        name: page_size
        required: false
        schema:
          default: 20
          description: Items per page
          maximum: 100
          minimum: 1
          title: Page Size
          type: integer
      - description: Filter by hub status
        in: query
        name: status
        required: false
        schema:
          anyOf:
          - $ref: '#/components/schemas/HubStatus'
          - type: 'null'
          description: Filter by hub status
          title: Status
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedHubs'
          description: Successful Response
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      summary: List Edge Hub devices
      tags:
      - Fleet Management
  /api/v1/fleet/{hub_id}/health:
    get:
      description: Fetch the current health status and live telemetry metrics for
        a specific Edge Hub. Returns 404 if the hub is not registered.
      operationId: get_hub_health_api_v1_fleet__hub_id__health_get
      parameters:
      - in: path
        name: hub_id
        required: true
        schema:
          format: uuid
          title: Hub Id
          type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EdgeHubHealth'
          description: Successful Response
        '404':
          description: Hub not found
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      summary: Get hub health status
      tags:
      - Fleet Management
  /api/v1/models/finetune:
    post:
      description: Enqueue a regional model fine-tuning job using recent analytics
        data collected from this SuperHub's Edge Hub fleet. The job runs asynchronously;
        poll the returned job_id for status updates (not yet implemented in this scaffold).
      operationId: trigger_finetune_api_v1_models_finetune_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FineTuneRequest'
        required: true
      responses:
        '202':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FineTuneJobResponse'
          description: Successful Response
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      summary: Trigger regional model fine-tuning
      tags:
      - Model Fine-Tuning
  /health:
    get:
      operationId: health_health_get
      responses:
        '200':
          content:
            application/json:
              schema:
                additionalProperties:
                  type: string
                title: Response Health Health Get
                type: object
          description: Successful Response
      summary: Health
      tags:
      - ops
